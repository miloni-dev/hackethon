<!DOCTYPE html>
<html>
<head>
  <title>Smart Secure Login</title>

  <style>
    body {
      text-align: center;
      font-family: Arial;
      background: linear-gradient(to right, black, #1a1a1a);
      color: white;
    }

    .box {
      margin-top: 100px;
      background: rgba(255,0,0,0.1);
      padding: 30px;
      border-radius: 10px;
      display: inline-block;
      box-shadow: 0 0 10px red;
    }

    input {
      padding: 10px;
      margin: 10px;
      width: 200px;
    }

    button {
      padding: 10px;
      background: red;
      color: white;
      border: none;
      cursor: pointer;
    }

    #msg {
      margin-top: 20px;
      font-size: 18px;
    }
  </style>
</head>

<body>

  <div class="box">
    <h2>🔐 Smart Secure Login</h2>

    <input type="text" id="user" placeholder="Username"><br>
    <input type="password" id="pass" placeholder="Password"><br>

    <button onclick="login()">Login</button>

    <p id="msg"></p>
    <p id="ip"></p>
  </div>

  <!-- 🔔 Alert Sound -->
  <audio id="alertSound">
    <source src="alert.wav" type="audio/wav">
  </audio>

  <script>
    let attempts = 0;

    // 📍 Fake IP Generator
    function generateIP() {
      return Math.floor(Math.random()*255) + "." +
             Math.floor(Math.random()*255) + "." +
             Math.floor(Math.random()*255) + "." +
             Math.floor(Math.random()*255);
    }

    function login(){
      let u = document.getElementById("user").value;
      let p = document.getElementById("pass").value;
      let msg = document.getElementById("msg");
      let ipBox = document.getElementById("ip");

      if(attempts >= 3){
        msg.innerText = "🚫 Account Blocked!";
        document.getElementById("alertSound").play();
        return;
      }

      if(u === "admin" && p === "1234"){
        msg.innerText = "✅ Login Successful 😎";
        ipBox.innerText = "📍 Safe Login";
      } else {
        attempts++;

        let fakeIP = generateIP();

        // 🔔 sound play
        document.getElementById("alertSound").play();

        // 🧠 AI-like warning messages
        let warnings = [
          "⚠️ Suspicious activity detected!",
          "🚨 Unauthorized access attempt!",
          "🧠 AI Alert: Possible hacking attempt!"
        ];
    

        let randomMsg = warnings[Math.floor(Math.random() * warnings.length)];

        msg.innerText = randomMsg + " Attempts: " + attempts;
        ipBox.innerText = "📍 IP Logged: " + fakeIP;
      }
    }
  </script>

</body>
</html>
